services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - frontend-net
    depends_on:
      frontend:
        condition: service_started
      api:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "5173"
    networks:
      - frontend-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5173/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    develop:
      watch:
        - action: sync
          path: ./frontend/src
          target: /app/src
        - action: rebuild
          path: ./frontend/package.json

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - .env
    networks:
      - frontend-net
      - backend-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    develop:
      watch:
        - action: sync+restart
          path: ./backend/src
          target: /app/src
        - action: rebuild
          path: ./backend/pyproject.toml

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    ipc: host
    shm_size: 2gb
    env_file:
      - .env
    command: ["python", "-m", "celery", "-A", "src.workers.celery_app", "worker", "--loglevel=info", "--queues=heavy", "--concurrency=2"]
    # Allow up to 5 minutes for in-flight Playwright/heavy tasks to complete
    # before Docker force-kills the container. task_acks_late=True means tasks
    # not yet acked (mid-execution) are re-queued by Redis on SIGTERM. (#6)
    stop_grace_period: 5m
    networks:
      - backend-net
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -m celery -A src.workers.celery_app inspect ping --destination celery@$$HOSTNAME --timeout 5 2>/dev/null | grep -q 'pong' || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 60s

  worker-light:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    command: ["python", "-m", "celery", "-A", "src.workers.celery_app", "worker", "--loglevel=info", "--queues=light,graph", "--concurrency=4"]
    stop_grace_period: 2m
    networks:
      - backend-net
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A src.workers.celery_app inspect ping --destination celery@$$HOSTNAME --timeout 5 2>/dev/null | grep -q 'pong' || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s

  worker-pentest:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker-pentest
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - backend-net
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - backend-net
    environment:
      - OLLAMA_KEEP_ALIVE=24h

  flower:
    image: mher/flower:2.0
    restart: unless-stopped
    # SECURITY NOTE (#35): Flower is only protected by HTTP Basic Auth, which
    # is sent in plaintext. Do NOT expose port 5555 on a public interface.
    # In production, place an nginx/Traefik reverse proxy with TLS in front of
    # Flower, or restrict access via firewall rules to your monitoring network.
    command: celery flower --basic-auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-changeme-flower}
    ports:
      - "5555:5555"
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=${REDIS_URL:-redis://redis:6379/0}
      - FLOWER_BASIC_AUTH=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-changeme-flower}
    networks:
      - backend-net
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - dev
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5555/healthcheck || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    expose:
      - "5432"
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-osint}
      POSTGRES_USER: ${POSTGRES_USER:-osint}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-osint} -d ${POSTGRES_DB:-osint}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    expose:
      - "7474"
      - "7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-changeme}
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1g
    volumes:
      - neo4j-data:/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    expose:
      - "9000"
      - "9001"
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $${MINIO_ACCESS_KEY} $${MINIO_SECRET_KEY}; do
        echo 'Waiting for MinIO...';
        sleep 2;
      done;
      mc mb --ignore-existing local/$${MINIO_BUCKET};
      echo 'Bucket created successfully';
      "
    env_file:
      - .env
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-osint-data}
    networks:
      - backend-net
    depends_on:
      minio:
        condition: service_healthy

  rsshub:
    image: diygod/rsshub:latest
    restart: unless-stopped
    expose:
      - "1200"
    environment:
      NODE_ENV: production
      CACHE_TYPE: redis
      REDIS_URL: redis://redis:6379/1
      REQUEST_TIMEOUT: "10000"
      REQUEST_RETRIES: "2"
      ALLOW_ORIGIN: "*"
      # X/Twitter auth — set these in .env to enable Twitter/X scraping.
      # Get auth_token + ct0 from browser DevTools → Application → Cookies on x.com
      TWITTER_AUTH_TOKEN: ${TWITTER_AUTH_TOKEN:-}
      TWITTER_CT0: ${TWITTER_CT0:-}
      # Optional: Twitter API v2 bearer token (alternative to cookie auth)
      TWITTER_BEARER_TOKEN: ${TWITTER_BEARER_TOKEN:-}
    networks:
      - backend-net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:1200/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    expose:
      - "6333"
      - "6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333' 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  redis-data:
  postgres-data:
  neo4j-data:
  minio-data:
  ollama-data:
  qdrant-data:

networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge
