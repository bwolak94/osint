global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alerts.yml

scrape_configs:
  - job_name: "api"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "osint-api"

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres:5432"]
        labels:
          service: "postgres"

  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]
        labels:
          service: "redis"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
