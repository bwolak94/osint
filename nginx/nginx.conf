worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;

    keepalive_timeout 65;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript
               text/xml image/svg+xml application/wasm application/xml application/rss+xml;
    gzip_min_length 256;

    # Limit request body to the largest API endpoint maximum (doc-metadata allows 50 MB).
    # This prevents nginx from buffering multi-gigabyte payloads before FastAPI rejects them.
    client_max_body_size 55m;

    # WebSocket upgrade map (must be defined before server blocks that use it)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream api_upstream {
        server api:8000;
    }

    upstream frontend_upstream {
        server frontend:5173;
    }

    server {
        listen 80;
        server_name _;

        # Security headers
        # NOTE: 'unsafe-inline' and 'unsafe-eval' are present because Vite dev server
        # uses them. For production, generate per-request nonces and switch to
        # script-src 'strict-dynamic' 'nonce-{NONCE}' to remove these directives.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' ws: wss:; font-src 'self'; frame-ancestors 'none'; base-uri 'self';" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        # HSTS omitted intentionally: this server listens on plain HTTP (port 80).
        # Add Strict-Transport-Security only when TLS is terminated at this server
        # or an upstream load balancer — sending it over HTTP is meaningless (RFC 6797 §7.2).

        # Health check
        location /health {
            proxy_pass http://api_upstream/health;
            proxy_set_header Host $http_host;
        }

        # Prometheus metrics — restrict to internal networks only.
        # The backend also validates METRICS_API_KEY for defense-in-depth.
        location /metrics {
            # Allow Docker internal networks; deny external traffic.
            allow 172.16.0.0/12;
            allow 10.0.0.0/8;
            allow 127.0.0.1;
            deny all;
            proxy_pass http://api_upstream/metrics;
            proxy_set_header Host $http_host;
        }

        location /health/live {
            proxy_pass http://api_upstream/health/live;
            proxy_set_header Host $http_host;
        }

        location /health/ready {
            proxy_pass http://api_upstream/health/ready;
            proxy_set_header Host $http_host;
        }

        # WorldMonitor module -- separate URL namespace, same backend
        location /worldmonitor/ {
            proxy_pass http://api_upstream;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # API proxy -- use $http_host to preserve original port in redirects
        location /api/ {
            proxy_pass http://api_upstream;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;

            # WebSocket support for /api/v1/investigations/*/live
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # Frontend proxy (catch-all)
        location / {
            proxy_pass http://frontend_upstream;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # No cache for HTML (SPA entry point) so new deploys are picked up
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # Cache hashed assets forever (Vite adds content hash to filenames)
        location /assets/ {
            proxy_pass http://frontend_upstream;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

}
