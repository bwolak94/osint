id: 018
name: Default Credentials Check
ptes_phase: exploitation
wstg_id: WSTG-ATHN-02
mitre:
  - T1078.001
cwe: 798
tools:
  - nuclei
  - httpx
template: nuclei -u {target} -t default-logins -j -silent -nt
matchers:
  - type: contains
    value: "default-login"
  - type: contains
    value: "default credential"
severity: critical
description: Test for default usernames and passwords on admin panels, IoT devices, and services.
risk: Critical
tags: [auth, credentials, default, brute]
