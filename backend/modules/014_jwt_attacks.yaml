id: 014
name: JWT Token Attacks
ptes_phase: exploitation
wstg_id: WSTG-SESS-10
mitre:
  - T1550.001
cwe: 347
tools:
  - nuclei
template: nuclei -u {target} -t jwt -j -silent -nt
matchers:
  - type: contains
    value: "jwt"
