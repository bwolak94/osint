id: 013
name: Exposed Credentials & Secrets
ptes_phase: intelligence_gathering
wstg_id: WSTG-INFO-05
mitre:
  - T1552.001
cwe: 312
tools:
  - nuclei
  - httpx
template: nuclei -u {target} -t exposures -j -silent -nt
matchers:
  - type: contains
    value: "api-key"
  - type: contains
    value: "token"
  - type: contains
    value: ".env"
  - type: contains
    value: "secret"
severity: critical
description: Detect exposed API keys, tokens, credentials in web responses and files.
risk: Critical
tags: [credentials, secrets, exposure, api-keys]
