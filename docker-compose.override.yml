# Development overrides
# Remapped ports to avoid conflicts with host services

services:
  nginx:
    ports:
      - "8080:80"

  api:
    volumes:
      - ./backend/src:/app/src
    environment:
      - DEBUG=true

  frontend:
    volumes:
      - ./frontend/src:/app/src

  postgres:
    ports:
      - "5433:5432"

  redis:
    ports:
      - "6381:6379"

  neo4j:
    ports:
      - "7475:7474"
      - "7688:7687"

  minio:
    ports:
      - "9002:9000"
      - "9003:9001"

  flower:
    profiles: []
